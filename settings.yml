use_default_settings: true

general:
  instance_name: "Claygent Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "claygent-searxng-secret-change-me"
  limiter: false
  public_instance: false
  image_proxy: false
  bind_address: "0.0.0.0"
  port: 8080

# Outgoing proxy rotation to avoid IP blocks from search engines
# Set SEARXNG_PROXY_URL env var to a rotating proxy endpoint, e.g.:
#   http://user:pass@p.webshare.io:80  (Webshare rotating proxy)
#   socks5://user:pass@proxy.example.com:1080
# If not set, requests go out directly (will get blocked on shared IPs)
outgoing:
  request_timeout: 10
  useragent_suffix: ""
  # Proxies are injected at runtime via entrypoint.sh from SEARXNG_PROXY_URL env var

# Redis URL is read from SEARXNG_REDIS_URL env var automatically

engines:
  # Prioritize engines that don't block aggressively
  # weight: higher = more results merged from this engine (default is 1)
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
    weight: 1.5

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    weight: 1.5

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    weight: 1.5

  # Google gets blocked on shared/datacenter IPs — keep enabled but lower weight
  - name: google
    engine: google
    shortcut: g
    disabled: false
    weight: 0.5

  # Disable image/video/music engines to save resources
  - name: google images
    disabled: true
  - name: bing images
    disabled: true
  - name: google videos
    disabled: true
  - name: bing videos
    disabled: true
  - name: youtube
    disabled: true
  - name: dailymotion
    disabled: true
  - name: vimeo
    disabled: true
  - name: soundcloud
    disabled: true
  - name: bandcamp
    disabled: true
